<!DOCTYPE html>

<html lang="en">
<head>
  <title>ETNA Code2Work - Vue.js</title>
</head>

<body>
    <div id="app"><h1>
        {{message}}
    </h1>
        
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js">
        
    </script>

    <script>

        const app = Vue.createApp({
            data() {
            return {
                message: "Bienvenue sur notre premier site en Vue.js!"
            }
            }
        })

        app.mount('#app')

    </script>
</body>

</html>
