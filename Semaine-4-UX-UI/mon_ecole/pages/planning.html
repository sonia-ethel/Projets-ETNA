<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planning · ETNA</title>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <link rel="stylesheet" href="../assets/css/planning.css"/>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-placeholder">Navbar — autre collègue</div>
  </aside>

  <div class="main-content">
    <div class="page-wrapper">

      <!-- HEADER -->
      <div class="page-header">
        <div class="header-left">
          <h1 class="page-title">Planning</h1>
          <p class="page-subtitle" id="week-label">Chargement...</p>
        </div>
        <div class="header-right">
          <div class="switch-cursus">
            <button class="switch-btn" id="btn-initial">Initial</button>
            <button class="switch-btn active" id="btn-alternance">Alternance</button>
          </div>
          <button class="btn-notif" id="btn-notif" title="Notifications">
            🔔<span class="notif-badge" id="notif-badge">3</span>
          </button>
          <div class="week-nav">
            <button class="btn-nav" id="prev-week">&#8249;</button>
            <button class="btn-nav btn-today" id="go-today">Aujourd'hui</button>
            <button class="btn-nav" id="next-week">&#8250;</button>
          </div>
        </div>
      </div>

      <!-- MODULE BANNER -->
      <div class="module-banner">
        <div class="module-info">
          <span class="module-label">Module en cours</span>
          <span class="module-name" id="module-name">—</span>
          <span class="module-meta" id="module-meta">—</span>
        </div>
        <div class="modules-progress-wrapper">
          <button class="scroll-btn" id="scroll-left">&#8249;</button>
          <div class="modules-progress-scroll" id="modules-progress"></div>
          <button class="scroll-btn" id="scroll-right">&#8250;</button>
        </div>
      </div>

      <!-- LÉGENDE -->
      <div class="legend">
        <span class="legend-item type-activite">Activité</span>
        <span class="legend-item type-soutenance">Soutenance</span>
        <span class="legend-item type-atelier">Atelier</span>
        <span class="legend-item type-projet">Projet</span>
        <span class="legend-item type-conference">Conférence</span>
        <span class="legend-item type-perso">Personnel</span>
        <span class="legend-item type-bde">BDE</span>
      </div>

      <!-- PLANNING + SIDEBAR -->
      <div class="planning-layout">
        <div id="planning-container"></div>
        <aside class="planning-sidebar">
          <div class="sidebar-card">
            <div class="sidebar-card-header">
              <span class="sidebar-card-title">📋 Rendus à venir</span>
            </div>
            <div class="sidebar-card-body" id="rendus-list"></div>
          </div>
          <div class="sidebar-card">
            <div class="sidebar-card-header">
              <span class="sidebar-card-title">🗓 Événements futurs</span>
            </div>
            <div class="sidebar-card-body" id="futurs-list"></div>
          </div>
        </aside>
      </div>

    </div>

    <!-- FOOTER -->
    <footer>
      <div class="footer-left">
        <span class="footer-logo">ETNA</span>
        <span class="footer-sub">École des Technologies Numériques Avancées · Ivry-sur-Seine</span>
      </div>
      <div class="footer-links">
        <a href="https://www.instagram.com/etna.io/" target="_blank" class="footer-link" title="Instagram">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
        </a>
        <a href="https://fr.linkedin.com/school/etna-école-d-alternance-en-informatique/" target="_blank" class="footer-link" title="LinkedIn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
        </a>
        <a href="https://www.facebook.com/ecole.etna/" target="_blank" class="footer-link" title="Facebook">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
        </a>
        <a href="https://www.youtube.com/@etna_io" target="_blank" class="footer-link" title="YouTube">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 00-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 001.46 6.42 29 29 0 001 12a29 29 0 00.46 5.58 2.78 2.78 0 001.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 001.95-1.96A29 29 0 0023 12a29 29 0 00-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="white"/></svg>
        </a>
      </div>
      <span class="footer-copy">© 2026 ETNA · Espace étudiant</span>
    </footer>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">Ajouter un événement</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-form">
        <div class="form-group">
          <label class="form-label">Titre</label>
          <input type="text" class="form-input" id="form-titre" placeholder="Ex: Entretien RH, Réunion BDE..."/>
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-select" id="form-type">
            <option value="perso">Personnel</option>
            <option value="bde">BDE / Événement école</option>
            <option value="conference">Conférence</option>
            <option value="atelier">Atelier</option>
            <option value="soutenance">Soutenance</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" class="form-input" id="form-date"/>
          </div>
          <div class="form-group">
            <label class="form-label">Heure</label>
            <input type="time" class="form-input" id="form-heure" value="09:00"/>
          </div>
        </div>
        <!-- Invités -->
        <div class="form-group">
          <label class="form-label">Inviter des personnes</label>
          <div class="invites-input-row">
            <input type="text" class="form-input" id="form-invite-input" placeholder="Prénom Nom ou email..."/>
            <button class="btn-add-invite" id="btn-add-invite">+</button>
          </div>
          <div class="invites-tags" id="invites-tags"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Note (optionnel)</label>
          <textarea class="form-textarea" id="form-note" placeholder="Détails supplémentaires..."></textarea>
        </div>
        <button class="btn-submit" id="form-submit">Ajouter l'événement</button>
      </div>
    </div>
  </div>

  <!-- PANNEAU NOTIFICATIONS -->
  <div class="notif-panel" id="notif-panel">
    <div class="notif-panel-header">
      <span class="notif-panel-title">🔔 Notifications</span>
      <div class="notif-panel-actions">
        <button class="notif-mark-all" id="mark-all-read">Tout lu</button>
        <button class="notif-close-btn" id="notif-close">✕</button>
      </div>
    </div>
    <div class="notif-list" id="notif-list"></div>
  </div>

  <script src="../assets/js/planning.js"></script>
</body>
</html>
