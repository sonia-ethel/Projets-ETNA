services:
  poll:
    build: ./poll
    environment:
      - REDIS_HOST=redis
    networks:
      - poll-tier
    ports:
      - "5000:80"
  redis:
    image: redis:7
    networks:
      - poll-tier
      - back-tier
    ports:
      - "6379:6379"

  worker:
    build: ./worker
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=db
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres 
      - POSTGRES_PORT=5432
    networks:
      - back-tier   
    depends_on:
      - redis
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    networks:
      - result-tier
      - back-tier
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql


  result:
    build: ./result
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
      - POSTGRES_PORT=5432 
    networks:
      - result-tier
    ports:
      - "5001:80"

networks:
  poll-tier:
  result-tier:
  back-tier:

volumes:
  db-data: